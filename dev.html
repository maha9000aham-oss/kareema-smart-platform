<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تجربة الأسئلة</title>

<style>
body {
  font-family: Arial;
  background:#F5F4FB;
  margin:0;
}

/* مكان عرض السؤال */
#app {
  max-width:600px;
  margin:50px auto;
  background:#fff;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

button {
  display:block;
  width:100%;
  padding:10px;
  margin:8px 0;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#eee;
  cursor:pointer;
}

button:hover {
  background:#ddd;
}
</style>

</head>

<body>

<h1 style="text-align:center;">منصة التجربة</h1>

<div id="app"></div>

<script>

/* ===== بنك الأسئلة ===== */
const banks = {
  math: {
    questions: []
  }
};

/* ===== إضافة عدة أسئلة ===== */
function addQuestions(list){
  banks.math.questions.push(...list);
}

/* ===== أسئلة تجريبية ===== */
addQuestions([
  {
    q: "كم ناتج 10 + 5 ؟",
    choices: ["12","13","15","20"],
    answer: "15",
    note: "10 + 5 = 15"
  },
  {
    q: "كم ناتج 8 + 3 ؟",
    choices: ["10","11","12","13"],
    answer: "11",
    note: "8 + 3 = 11"
  }
]);

/* ===== المتغير الحالي ===== */
let currentIndex = 0;

/* ===== عرض السؤال ===== */
function startTest(){
  const q = banks.math.questions[currentIndex];

  document.getElementById("app").innerHTML = `
    <h2>${q.q}</h2>

    ${q.choices.map(c => 
      `<button onclick="check('${c}')">${c}</button>`
    ).join("")}

    <div id="fb" style="margin-top:15px;"></div>

    <button onclick="nextQuestion()">التالي</button>
  `;
}

/* ===== التحقق ===== */
function check(choice){
  const q = banks.math.questions[currentIndex];
  const fb = document.getElementById("fb");

  if(choice === q.answer){
    fb.innerHTML = "✅ إجابة صحيحة<br>" + q.note;
  } else {
    fb.innerHTML = "❌ إجابة خاطئة<br>" + q.note;
  }
}

/* ===== الانتقال ===== */
function nextQuestion(){
  currentIndex++;

  if(currentIndex >= banks.math.questions.length){
    document.getElementById("app").innerHTML = "<h2>انتهت الأسئلة</h2>";
    return;
  }

  startTest();
}

/* ===== تشغيل ===== */
startTest();

</script>

</body>
</html>
