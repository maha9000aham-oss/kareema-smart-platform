<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منصة كريمة بنت همام الذكية</title>

<style>
:root{
  --primary:#6C3CF7;
  --secondary:#9B6DFF;
  --bg:#f5f3ff;
  --white:#ffffff;
}

body{
  margin:0;
  font-family: sans-serif;
  background:var(--bg);
}

/* ===== الهيدر ===== */
.hero{
  background: linear-gradient(135deg,var(--primary),var(--secondary));
  color:white;
  padding:60px 20px;
  text-align:center;
  border-bottom-left-radius:40px;
  border-bottom-right-radius:40px;
}

.hero h1{
  font-size:32px;
  margin-bottom:10px;
}

.hero p{
  opacity:0.9;
}

/* رسالة تحفيزية */
.motivation{
  margin-top:15px;
  font-size:18px;
}

/* زر */
.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:12px;
  background:white;
  color:var(--primary);
  font-weight:bold;
  cursor:pointer;
}

/* ===== اختيار المجال ===== */
.section{
  padding:30px;
  text-align:center;
}

.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:white;
  padding:20px;
  width:250px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* ===== الاختبار ===== */
.quiz{
  display:none;
  padding:30px;
}

.question{
  background:white;
  padding:20px;
  border-radius:15px;
}

.option{
  display:block;
  margin:10px 0;
  padding:10px;
  background:#eee;
  border-radius:10px;
  cursor:pointer;
}

/* ===== النتيجة ===== */
.result{
  display:none;
  text-align:center;
  padding:40px;
}

.footer-box{
  margin-top:30px;
  background:white;
  padding:20px;
  border-radius:15px;
}
</style>
</head>

<body>

<!-- ===== الصفحة الرئيسية ===== -->
<div class="hero">
  <h1>منصة كريمة بنت همام الذكية</h1>
  <p>منافسون للقمة</p>

  <div class="motivation" id="motivationText"></div>

  <button class="btn" onclick="scrollToSubjects()">ابدئي الآن</button>
</div>

<!-- ===== المجالات ===== -->
<div class="section" id="subjects">
  <h2>اختاري المجال</h2>

  <div class="cards">
    <div class="card" onclick="startQuiz('math')">📊<br>الرياضيات</div>
    <div class="card" onclick="startQuiz('reading')">📖<br>القراءة</div>
    <div class="card" onclick="startQuiz('science')">🧪<br>العلوم</div>
  </div>
</div>

<!-- ===== الاختبار ===== -->
<div class="quiz" id="quizBox">
  <div class="question" id="questionText"></div>
  <div id="optionsBox"></div>

  <button class="btn" onclick="nextQuestion()">التالي</button>
  <button class="btn" onclick="restartQuiz()">إعادة المحاولة</button>
</div>

<!-- ===== النتيجة ===== -->
<div class="result" id="resultBox">
  <h2 id="scoreText"></h2>

  <div class="footer-box">
    <p>
    رحلة تدريبية ملهمة، نحو أداءٍ متميز ومستقبلٍ واعد،  
    انسجامًا مع مستهدفات رؤية السعودية 2030.
    </p>

    <hr>

    <p><b>برعاية قائدة المدرسة</b><br>
    الأستاذة / ابتهال عبدالله الصاملي</p>

    <p><b>تصميم وإعداد</b><br>
    الأستاذة / مهاء يوسف الشهراني</p>
  </div>

  <button class="btn" onclick="goHome()">العودة للرئيسية</button>
</div>

<script>

/* ===== رسالة تحفيزية ===== */
const messages = [
"جاهزة تتفوقي؟ 💜",
"ابدئي الآن واثبتي تميزك 🚀",
"خطوة صغيرة اليوم = إنجاز كبير غدًا ✨",
"أنتِ قادرة على تحقيق أعلى الدرجات 💯"
];

document.getElementById("motivationText").innerText =
messages[Math.floor(Math.random()*messages.length)];

/* ===== بيانات بسيطة ===== */
let questions = [
{
q:"كم ناتج 5 + 3 ؟",
options:["6","7","8","9"],
answer:2
}
];

let current = 0;
let score = 0;

/* ===== وظائف ===== */
function scrollToSubjects(){
  document.getElementById("subjects").scrollIntoView({behavior:"smooth"});
}

function startQuiz(){
  document.getElementById("quizBox").style.display="block";
  document.getElementById("subjects").style.display="none";
  loadQuestion();
}

function loadQuestion(){
  let q = questions[current];
  document.getElementById("questionText").innerText = q.q;

  let box = document.getElementById("optionsBox");
  box.innerHTML="";

  q.options.forEach((opt,i)=>{
    let btn = document.createElement("div");
    btn.className="option";
    btn.innerText=opt;
    btn.onclick=()=>selectAnswer(i);
    box.appendChild(btn);
  });
}

function selectAnswer(i){
  if(i === questions[current].answer){
    score++;
  }
}

function nextQuestion(){
  current++;
  if(current >= questions.length){
    showResult();
  }else{
    loadQuestion();
  }
}

function showResult(){
  document.getElementById("quizBox").style.display="none";
  document.getElementById("resultBox").style.display="block";
  document.getElementById("scoreText").innerText =
  "نتيجتك: " + score;
}

function restartQuiz(){
  current=0;
  score=0;
  loadQuestion();
}

function goHome(){
  location.reload();
}

</script>

</body>
</html>
