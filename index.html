<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة كريمة بنت همام الذكية | محاكاة نافس</title>

<style>
:root{
  --primary:#6C4CF1;
  --secondary:#8E6BFF;
  --soft:#F3EEFF;
  --bg:#F7F6FC;
  --text:#1F2440;
  --card:#ffffff;
}

body{
  margin:0;
  font-family: "Segoe UI", sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* شاشة تحميل */
.loader{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#5b3ee6,#8e6bff);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  z-index:9999;
}

.spinner{
  width:60px;
  height:60px;
  border:6px solid rgba(255,255,255,.3);
  border-top:6px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:20px;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* الهيدر */
.hero{
  background:linear-gradient(135deg,#5b3ee6,#8e6bff);
  padding:80px 20px;
  text-align:center;
  color:white;
  border-bottom-left-radius:40px;
  border-bottom-right-radius:40px;
}

.hero h1{
  font-size:36px;
  margin-bottom:10px;
}

.hero p{
  opacity:.9;
}

/* زر */
.btn{
  background:var(--primary);
  color:white;
  padding:14px 28px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

/* البطاقات */
.section{
  padding:40px 20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
  cursor:pointer;
}

.card:hover{
  transform:translateY(-5px);
}

/* الاختبار */
.quiz{
  display:none;
  padding:20px;
}

.question{
  font-size:20px;
  margin-bottom:15px;
}

.answers button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  background:white;
  cursor:pointer;
}

.answers button:hover{
  background:var(--soft);
}

/* النتيجة */
.result{
  display:none;
  text-align:center;
  padding:40px;
}
</style>
</head>

<body>

<!-- شاشة تحميل -->
<div class="loader" id="loader">
  <div class="spinner"></div>
  <div>جاري تحميل المنصة...</div>
</div>

<!-- الصفحة الرئيسية -->
<div class="hero">
  <h1>منصة كريمة بنت همام الذكية</h1>
  <p>منصة تدريبية رسمية لمحاكاة اختبارات نافس</p>
</div>

<div class="section">
  <h2 style="text-align:center">اختاري المجال</h2>

  <div class="cards">
    <div class="card" onclick="startQuiz('math')">📘 الرياضيات</div>
    <div class="card" onclick="startQuiz('reading')">📖 القراءة</div>
    <div class="card" onclick="startQuiz('science')">🔬 العلوم</div>
  </div>
</div><div class="quiz" id="quiz">

  <div id="questionBox"></div>
  <div class="answers" id="answers"></div>

  <button class="btn" onclick="nextQuestion()">التالي</button>
</div>

<div class="result" id="result">
  <h2 id="scoreText"></h2>
  <p>رحلة تدريبية ملهمة، نحو أداءٍ متميز ومستقبلٍ واعد ✨</p>

  <hr>

  <p><strong>برعاية قائدة المدرسة</strong><br>
  الأستاذة / ابتهال عبدالله الصاملي</p>

  <p><strong>تصميم وإعداد</strong><br>
  الأستاذة / مهاء يوسف الشهراني</p>
</div>

<script>
let questions = {
  math:[
    {
      q:"ما نوع المثلث؟",
      img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Right_triangle.svg/512px-Right_triangle.svg.png",
      options:["حاد","قائم","منفرج","متساوي"],
      answer:1
    },
    {
      q:"كم ناتج 5 + 3 ؟",
      options:["6","7","8","9"],
      answer:2
    }
  ],

  science:[
    {
      q:"ما هذا العضو؟",
      img:"https://upload.wikimedia.org/wikipedia/commons/4/4c/Mitochondrion_structure.svg",
      options:["نواة","ميتوكندريا","خلية","غشاء"],
      answer:1
    }
  ],

  reading:[
    {
      q:"اختاري المعنى الصحيح لكلمة (سريع)",
      options:["بطيء","نشيط","متأخر","ضعيف"],
      answer:1
    }
  ]
};

let current=0;
let score=0;
let selected=[];

function startQuiz(type){
  document.querySelector('.section').style.display="none";
  document.getElementById('quiz').style.display="block";
  selected = questions[type];
  current=0;
  score=0;
  loadQuestion();
}

function loadQuestion(){
  let q = selected[current];

  let html = "<div class='question'>"+q.q+"</div>";

  if(q.img){
    html += "<img src='"+q.img+"' style='max-width:200px;margin:10px'>";
  }

  document.getElementById('questionBox').innerHTML = html;

  let answersHTML="";
  q.options.forEach((opt,i)=>{
    answersHTML += `<button onclick="checkAnswer(${i})">${opt}</button>`;
  });

  document.getElementById('answers').innerHTML = answersHTML;
}

function checkAnswer(i){
  if(i === selected[current].answer){
    score++;
  }
}

function nextQuestion(){
  current++;
  if(current < selected.length){
    loadQuestion();
  }else{
    showResult();
  }
}

function showResult(){
  document.getElementById('quiz').style.display="none";
  document.getElementById('result').style.display="block";
  document.getElementById('scoreText').innerText = "نتيجتك: "+score;
}

/* إزالة شاشة التحميل */
window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById('loader').style.display="none";
  },1000);
}
</script>

</body>
</html>
