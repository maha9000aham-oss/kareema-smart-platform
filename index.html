<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة كريمة الذكية</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h1>منصة كريمة بنت همام الذكية</h1>

<h2>سؤال 2</h2>

<p>أي من الخيارات التالية يمثل نوعًا من أنواع المثلثات حسب الأضلاع؟</p>

<!-- الصورة -->
<img src="images/q1.jpeg" width="300"><br><br>

<!-- الفيديو -->
<h3>شاهد الفيديو:</h3>
<video controls width="400">
  <source src="media/q1.mp4" type="video/mp4">
  متصفحك لا يدعم تشغيل الفيديو
</video>

<br><br>

<!-- الخيارات -->
<button onclick="checkAnswer('wrong')">مثلث قائم الزاوية</button><br><br>

<button onclick="checkAnswer('correct')">مثلث متساوي الأضلاع</button><br><br>

<button onclick="checkAnswer('wrong')">مثلث حاد الزوايا</button><br><br>

<button onclick="checkAnswer('wrong')">مثلث منفرج الزاوية</button>

<br><br>

<!-- النتيجة -->
<p id="result" style="font-size:20px; font-weight:bold;"></p>

<script>
function checkAnswer(answer) {
  if(answer === 'correct') {
    document.getElementById("result").innerHTML = "✅ إجابة صحيحة";
    document.getElementById("result").style.color = "green";
  } else {
    document.getElementById("result").innerHTML = "❌ إجابة خاطئة";
    document.getElementById("result").style.color = "red";
  }
}
</script>

</body>
</html>
