<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة كريمة بنت همام الذكية</title>

<style>
body {
    font-family: sans-serif;
    background: #f4f7fb;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.header {
    background: #1f7a6d;
    color: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
}

button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.start-btn {
    background: white;
    color: #1f7a6d;
    margin-top: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

.option {
    display: block;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 10px;
    margin: 10px 0;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header" id="home">
<h1>منصة كريمة بنت همام الذكية</h1>
<p>منافسون للقمة</p>
<button class="start-btn" onclick="chooseSection()">ابدئي التدريب الآن</button>
</div>

<div id="section" style="display:none" class="card">
<h3>اختاري المجال</h3>
<button onclick="startQuiz('math')">رياضيات</button>
<button onclick="startQuiz('reading')">قراءة</button>
<button onclick="startQuiz('science')">علوم</button>
</div>

<div id="quiz" style="display:none" class="card">
<h3 id="question"></h3>
<div id="options"></div>
<button onclick="nextQuestion()">التالي</button>
</div>

<div id="result" style="display:none" class="card">
<h2 id="score"></h2>
<button onclick="restart()">إعادة المحاولة</button>
</div>

</div>

<script>

let questions = [
{
q: "كم ناتج 3 + 5 ؟",
options: ["6","7","8","9"],
answer: "8"
},
{
q: "ما هو الكوكب الأقرب للشمس؟",
options: ["الأرض","عطارد","المريخ","المشتري"],
answer: "عطارد"
}
];

let current = 0;
let score = 0;

function chooseSection(){
document.getElementById("home").style.display="none";
document.getElementById("section").style.display="block";
}

function startQuiz(){
document.getElementById("section").style.display="none";
document.getElementById("quiz").style.display="block";
showQuestion();
}

function showQuestion(){
let q = questions[current];
document.getElementById("question").innerText = q.q;

let optionsHTML = "";
q.options.forEach(opt=>{
optionsHTML += `<div class="option" onclick="selectAnswer('${opt}')">${opt}</div>`;
});
document.getElementById("options").innerHTML = optionsHTML;
}

function selectAnswer(opt){
if(opt === questions[current].answer){
score++;
}
}

function nextQuestion(){
current++;
if(current < questions.length){
showQuestion();
}else{
showResult();
}
}

function showResult(){
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("score").innerText = "درجتك: " + score;
}

function restart(){
location.reload();
}

</script>

</body>
</html>
