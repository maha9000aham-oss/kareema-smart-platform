<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة كريمة بنت همام الذكية | نافس</title>

<style>
body{
font-family: "Tajawal", sans-serif;
background:#f4f7fb;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.header{
background:#0f766e;
color:white;
padding:30px;
border-radius:20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card:hover{
transform:scale(1.05);
}

.hidden{
display:none;
}

.question-box{
background:white;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.option{
display:block;
margin:10px 0;
padding:10px;
border:1px solid #ccc;
border-radius:10px;
cursor:pointer;
}

.option:hover{
background:#e6fffa;
}

.btn{
background:#0f766e;
color:white;
padding:10px 20px;
border:none;
border-radius:10px;
margin-top:15px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>منصة كريمة بنت همام الذكية</h1>
<p>منافسون للقمة</p>
</div>

<!-- الصفحة الرئيسية -->
<div id="home">

<div class="grid">

<div class="card" onclick="startSection('math')">
📊<br>الرياضيات
</div>

<div class="card">
📖<br>القراءة
</div>

<div class="card">
🔬<br>العلوم
</div>

</div>
</div>

<!-- صفحة الأسئلة -->
<div id="quiz" class="hidden">

<div class="question-box">
<h3 id="question"></h3>

<div id="options"></div>

<button class="btn" onclick="nextQuestion()">التالي</button>
</div>

</div>

</div>

<script>

let questions = [
{
q:"كم ناتج 5 + 3 ؟",
options:["6","7","8","9"],
answer:2
},
{
q:"كم ناتج 9 × 2 ؟",
options:["18","16","20","14"],
answer:0
},
{
q:"كم ناتج 10 - 4 ؟",
options:["5","6","7","8"],
answer:1
}
];

let current = 0;

function startSection(section){
document.getElementById("home").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
showQuestion();
}

function showQuestion(){
let q = questions[current];
document.getElementById("question").innerText = q.q;

let optionsHTML = "";
q.options.forEach((opt,i)=>{
optionsHTML += `<div class="option" onclick="selectAnswer(${i})">${opt}</div>`;
});

document.getElementById("options").innerHTML = optionsHTML;
}

function selectAnswer(i){
if(i === questions[current].answer){
alert("إجابة صحيحة ✅");
}else{
alert("إجابة خاطئة ❌");
}
}

function nextQuestion(){
current++;
if(current >= questions.length){
alert("انتهى التدريب 🎉");
location.reload();
}else{
showQuestion();
}
}

</script>

</body>
</html>
